server:
  port: ${PORT:8080}
  shutdown: graceful
  forward-headers-strategy: framework

spring:
  application:
    name: reengage-core-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/reengage}
    username: ${DATABASE_USER:reengage}
    password: ${DATABASE_PASSWORD:reengage-local-only}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:20}
      minimum-idle: 2
      connection-timeout: 3000
  flyway:
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        enable.idempotence: true
        acks: all
    consumer:
      group-id: reengage-profile-decision-v1
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      ack-mode: record

app:
  jwt-secret: ${JWT_SECRET:local-development-secret-change-me-32-bytes-minimum}
  jwt-ttl: ${JWT_TTL:PT8H}
  ai-base-url: ${AI_BASE_URL:http://localhost:8000}
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  notification:
    demo-delay: ${NOTIFICATION_DELAY:PT24H}
    max-retries: 5

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  tracing:
    sampling:
      probability: ${TRACING_SAMPLE_RATE:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  pattern:
    correlation: "[%X{traceId:-},%X{spanId:-}] "
