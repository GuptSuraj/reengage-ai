name: reengageai

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks: [reengage]

services:
  frontend:
    <<: *service-defaults
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    environment:
      CORE_API_URL: http://core-api:8080
      COOKIE_SECURE: "false"
    ports: ["3000:3000"]
    depends_on:
      core-api: {condition: service_healthy}

  core-api:
    <<: *service-defaults
    build: ./services/core-api
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/reengage
      DATABASE_USER: reengage
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-reengage-local-only}
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      AI_BASE_URL: http://ai-service:8000
      FRONTEND_URL: http://localhost:3000
      JWT_SECRET: ${JWT_SECRET:-local-demo-secret-with-at-least-thirty-two-characters}
      NOTIFICATION_DELAY: ${NOTIFICATION_DELAY:-PT15S}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318/v1/traces
    ports: ["8080:8080"]
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
      kafka: {condition: service_healthy}
      ai-service: {condition: service_healthy}
    healthcheck:
      test: ["CMD-SHELL","wget -q -O - http://localhost:8080/actuator/health/liveness >/dev/null"]
      interval: 10s
      timeout: 4s
      retries: 15
      start_period: 30s

  ai-service:
    <<: *service-defaults
    build: ./services/ai-service
    environment:
      REENGAGE_AI_QDRANT_URL: http://qdrant:6333
      REENGAGE_AI_MODEL_VERSION: rules-hybrid-v1
    ports: ["8000:8000"]
    depends_on:
      qdrant: {condition: service_started}
    healthcheck:
      test: ["CMD","python","-c","import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live')"]
      interval: 10s
      timeout: 3s
      retries: 10

  postgres:
    <<: *service-defaults
    image: postgres:17.10-alpine
    environment:
      POSTGRES_DB: reengage
      POSTGRES_USER: reengage
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-reengage-local-only}
    ports: ["5432:5432"]
    volumes: ["postgres-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U reengage -d reengage"]
      interval: 5s
      timeout: 3s
      retries: 15

  redis:
    <<: *service-defaults
    image: redis:8.8-alpine
    command: ["redis-server","--appendonly","yes","--maxmemory-policy","noeviction"]
    ports: ["6379:6379"]
    volumes: ["redis-data:/data"]
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 5s
      timeout: 3s
      retries: 15

  kafka:
    <<: *service-defaults
    image: apache/kafka:4.3.1
    ports: ["29092:29092"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: CONTROLLER://:9093,PLAINTEXT://:9092,PLAINTEXT_HOST://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL","/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null"]
      interval: 10s
      timeout: 8s
      retries: 15
      start_period: 20s

  qdrant:
    <<: *service-defaults
    image: qdrant/qdrant:v1.15.3
    ports: ["6333:6333","6334:6334"]
    volumes: ["qdrant-data:/qdrant/storage"]

  otel-collector:
    <<: *service-defaults
    image: otel/opentelemetry-collector-contrib:0.131.1
    command: ["--config=/etc/otelcol/config.yml"]
    volumes: ["./infra/otel/config.yml:/etc/otelcol/config.yml:ro"]
    ports: ["4317:4317","4318:4318"]

  prometheus:
    <<: *service-defaults
    image: prom/prometheus:v3.5.0
    command: ["--config.file=/etc/prometheus/prometheus.yml","--storage.tsdb.retention.time=15d"]
    volumes: ["./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro"]
    ports: ["9090:9090"]
    depends_on: [core-api,ai-service]

  grafana:
    <<: *service-defaults
    image: grafana/grafana:12.1.1
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    ports: ["3001:3000"]
    depends_on: [prometheus]

networks:
  reengage:
    driver: bridge
volumes:
  postgres-data:
  redis-data:
  qdrant-data:
  grafana-data:
