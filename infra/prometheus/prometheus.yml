global:
  scrape_interval: 15s
  evaluation_interval: 15s
scrape_configs:
  - job_name: reengage-core
    metrics_path: /actuator/prometheus
    static_configs: [{targets: ["core-api:8080"]}]
  - job_name: reengage-ai
    metrics_path: /metrics
    static_configs: [{targets: ["ai-service:8000"]}]
  - job_name: prometheus
    static_configs: [{targets: ["localhost:9090"]}]
